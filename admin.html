<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdaptFit — Admin Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #0a0a0c;
    --void-2: #0e0f13;
    --graphite: #15161b;
    --graphite-2: #1b1c22;
    --hairline: #26282f;
    --hairline-soft: #1d1e24;
    --bone: #eceef1;
    --bone-dim: #c7c9cf;
    --slate: #8b8f9a;
    --slate-dim: #5c5f68;
    --blue: #3e6bff;
    --blue-bright: #6f8dff;
    --blue-dim: #1f3384;
    --blue-glow: rgba(62,107,255,0.35);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 20px;
    --ease: cubic-bezier(.16,.84,.44,1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--void);
    color: var(--bone);
    font-family: 'Inter', sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: hidden;
  }
  input, button, select { font-family: inherit; color: inherit; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 18px; border-radius: 100px; font-size: 14px; font-weight: 600;
    transition: transform .25s var(--ease), box-shadow .25s var(--ease), background .25s ease;
    cursor: pointer; border: none;
  }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px var(--blue-glow); }
  .btn-ghost { background: transparent; color: var(--bone); border: 1px solid var(--hairline); }
  .btn-ghost:hover { border-color: var(--slate-dim); background: rgba(255,255,255,0.03); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

  /* Login Screen */
  #loginScreen {
    display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px;
    background: radial-gradient(circle at 50% 30%, rgba(62, 107, 255, 0.08), transparent 70%);
  }
  .login-card {
    background: var(--graphite); border: 1px solid var(--hairline); border-radius: var(--radius-lg);
    padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }
  .login-header { text-align: center; margin-bottom: 30px; }
  .login-header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 6px; }
  .login-header p { font-size: 14px; color: var(--slate); }
  .field { margin-bottom: 20px; }
  .field label { font-size: 13px; color: var(--slate); display: block; margin-bottom: 6px; }
  .field input {
    width: 100%; background: var(--void); border: 1px solid var(--hairline); border-radius: var(--radius-sm);
    padding: 12px 14px; color: var(--bone); font-size: 15px; transition: border-color .25s ease;
  }
  .field input:focus { outline: none; border-color: var(--blue); }
  .error-msg { color: #ff7a7a; font-size: 13px; min-height: 18px; margin-top: 10px; text-align: center; }

  /* Main Dashboard Wrapper */
  #dashboard { display: none; }
  header {
    background: var(--void-2); border-bottom: 1px solid var(--hairline-soft);
    padding: 16px 40px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 19px; display: flex; align-items: center; gap: 8px; }
  .logo .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); }
  .logo span { font-weight: 400; color: var(--slate); font-size: 14px; margin-left: 6px; padding-left: 10px; border-left: 1px solid var(--hairline); }
  .user-badge { display: flex; align-items: center; gap: 16px; font-size: 14px; }
  .user-email { color: var(--slate); font-family: 'JetBrains Mono', monospace; }

  main { padding: 40px; max-width: 1600px; margin: 0 auto; }

  /* Metrics Panel */
  .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
  @media (max-width: 1024px) { .metrics-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 640px) { .metrics-grid { grid-template-columns: 1fr; } }
  .metric-card {
    background: var(--graphite); border: 1px solid var(--hairline); border-radius: var(--radius-md);
    padding: 24px; position: relative; overflow: hidden;
  }
  .metric-card::after {
    content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--hairline);
  }
  .metric-card.accent::after { background: var(--blue); }
  .metric-card span { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--slate); }
  .metric-card b { display: block; font-family: 'Space Grotesk', sans-serif; font-size: 36px; font-weight: 700; color: var(--bone); margin-top: 8px; }

  /* Controls Panel */
  .controls-panel {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;
    gap: 20px; flex-wrap: wrap;
  }
  .tabs { display: flex; background: var(--void-2); border: 1px solid var(--hairline-soft); padding: 4px; border-radius: 100px; }
  .tab-btn {
    padding: 8px 20px; border-radius: 100px; font-size: 14px; font-weight: 600; color: var(--slate);
    transition: color .2s, background .2s; border: none; background: none; cursor: pointer;
  }
  .tab-btn.active { background: var(--graphite); color: var(--bone); border: 1px solid var(--hairline); }
  .actions { display: flex; align-items: center; gap: 12px; }
  .search-wrapper { position: relative; }
  .search-input {
    background: var(--graphite); border: 1px solid var(--hairline); border-radius: 100px;
    padding: 10px 16px 10px 40px; color: var(--bone); font-size: 14px; width: 260px;
    transition: width .3s, border-color .3s;
  }
  .search-input:focus { outline: none; border-color: var(--slate); width: 320px; }
  .search-icon {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; stroke: var(--slate); pointer-events: none;
  }

  /* Table styles */
  .table-container {
    background: var(--graphite); border: 1px solid var(--hairline); border-radius: var(--radius-lg);
    overflow: hidden; margin-bottom: 30px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
  }
  .table-scroll { overflow-x: auto; width: 100%; }
  table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
  th {
    background: var(--void-2); color: var(--slate); font-weight: 600; padding: 16px 24px;
    border-bottom: 1px solid var(--hairline-soft); text-transform: uppercase; font-size: 11px; letter-spacing: 0.08em;
  }
  td { padding: 18px 24px; border-bottom: 1px solid var(--hairline-soft); color: var(--bone-dim); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.015); color: var(--bone); }
  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 3px 8px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500;
  }
  .badge-yes { background: rgba(62,107,255,0.15); color: var(--blue-bright); }
  .badge-no { background: rgba(255,255,255,0.05); color: var(--slate); }
  .date-cell { font-family: 'JetBrains Mono', monospace; color: var(--slate); font-size: 13px; }
  .no-data { text-align: center; padding: 60px 24px; color: var(--slate); font-size: 15px; }

  /* Custom Scrollbars */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--void); }
  ::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 10px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <div class="login-card">
      <div class="login-header">
        <h1>Admin Login</h1>
        <p>Access the AdaptFit Waitlist dashboard</p>
      </div>
      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="admin@email.com">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="loginBtn">Login</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>
    </div>
  </div>

  <!-- DASHBOARD PANEL -->
  <div id="dashboard">
    <header>
      <div class="logo">
        <span class="dot"></span>AdaptFit <span>Admin Console</span>
      </div>
      <div class="user-badge">
        <div class="user-email" id="userEmail"></div>
        <button class="btn btn-ghost" id="logoutBtn">Logout</button>
      </div>
    </header>

    <main>
      <!-- Metrics Grid -->
      <div class="metrics-grid">
        <div class="metric-card accent">
          <span>Waitlist Signups</span>
          <b id="metricTotal">0</b>
        </div>
        <div class="metric-card">
          <span>Unique Countries</span>
          <b id="metricCountries">0</b>
        </div>
        <div class="metric-card">
          <span>Survey Responses</span>
          <b id="metricSurveys">0</b>
        </div>
        <div class="metric-card">
          <span>Prototype Tester Interest</span>
          <b id="metricInterest">0%</b>
        </div>
      </div>

      <!-- Controls & Search -->
      <div class="controls-panel">
        <div class="tabs">
          <button class="tab-btn active" id="tabWaitlistBtn">Waitlist (0)</button>
          <button class="tab-btn" id="tabSurveysBtn">Surveys (0)</button>
        </div>

        <div class="actions">
          <div class="search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" class="search-input" id="searchInput" placeholder="Search entries...">
          </div>
          <button class="btn btn-ghost" id="refreshBtn">
            Refresh
          </button>
          <button class="btn btn-primary" id="exportBtn">Export CSV</button>
        </div>
      </div>

      <!-- Data Table -->
      <div class="table-container">
        <div class="table-scroll">
          <table id="dataTable">
            <thead>
              <tr id="tableHeaders">
                <!-- Headers added dynamically -->
              </tr>
            </thead>
            <tbody id="tableBody">
              <!-- Body data added dynamically -->
            </tbody>
          </table>
        </div>
        <div id="noDataContainer" class="no-data" style="display: none;">
          No matching records found.
        </div>
      </div>
    </main>
  </div>

<script>
async function initAdmin() {
  // Load config from /api/config (Vercel env vars) or local config.js fallback
  let supabase = null;
  try {
    const configSrc = window.SUPABASE_CONFIG
      ? window.SUPABASE_CONFIG
      : await fetch('/api/config').then(r => r.json());
    const { createClient } = window.supabase || {};
    if (createClient && configSrc.url && configSrc.anonKey) {
      supabase = createClient(configSrc.url, configSrc.anonKey);
    }
  } catch(e) {
    console.warn('Could not load Supabase config:', e);
  }

(function(supabase) {

  // DOM Elements
  const loginScreen = document.getElementById('loginScreen');
  const loginForm = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');
  const dashboard = document.getElementById('dashboard');
  const userEmail = document.getElementById('userEmail');
  const logoutBtn = document.getElementById('logoutBtn');

  const metricTotal = document.getElementById('metricTotal');
  const metricCountries = document.getElementById('metricCountries');
  const metricSurveys = document.getElementById('metricSurveys');
  const metricInterest = document.getElementById('metricInterest');

  const tabWaitlistBtn = document.getElementById('tabWaitlistBtn');
  const tabSurveysBtn = document.getElementById('tabSurveysBtn');
  const searchInput = document.getElementById('searchInput');
  const refreshBtn = document.getElementById('refreshBtn');
  const exportBtn = document.getElementById('exportBtn');

  const tableHeaders = document.getElementById('tableHeaders');
  const tableBody = document.getElementById('tableBody');
  const noDataContainer = document.getElementById('noDataContainer');

  // State Management
  let currentTab = 'waitlist'; // 'waitlist' or 'surveys'
  let waitlistData = [];
  let surveysData = [];
  let currentSearch = '';

  // ---------- Supabase Authentication Listeners ----------
  if (supabase) {
    supabase.auth.onAuthStateChange((event, session) => {
      if (session) {
        // Authenticated
        loginScreen.style.display = 'none';
        dashboard.style.display = 'block';
        userEmail.textContent = session.user.email;
        loadData();
      } else {
        // Logged out
        loginScreen.style.display = 'flex';
        dashboard.style.display = 'none';
        userEmail.textContent = '';
      }
    });
  } else {
    errorMsg.textContent = 'Configuration error: Supabase client could not be loaded.';
  }

  // Handle Login Form
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    loginBtn.disabled = true;
    loginBtn.textContent = 'Authenticating...';
    errorMsg.textContent = '';

    try {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
    } catch (err) {
      console.error(err);
      errorMsg.textContent = err.message || 'Failed to authenticate. Please check your credentials.';
      loginBtn.disabled = false;
      loginBtn.textContent = 'Login';
    }
  });

  // Handle Logout
  logoutBtn.addEventListener('click', async () => {
    await supabase.auth.signOut();
  });

  // ---------- Data Loading & Processing ----------
  async function loadData() {
    if (!supabase) return;
    refreshBtn.disabled = true;
    refreshBtn.textContent = 'Loading...';

    try {
      // Fetch Waitlist
      const { data: wData, error: wErr } = await supabase
        .from('waitlist')
        .select('*')
        .order('created_at', { ascending: false });
      
      if (wErr) throw wErr;
      waitlistData = wData || [];

      // Fetch Surveys
      const { data: sData, error: sErr } = await supabase
        .from('polls')
        .select('*')
        .order('created_at', { ascending: false });

      if (sErr) throw sErr;
      surveysData = sData || [];

      // Update counters & metrics
      updateMetrics();
      renderCurrentTable();

    } catch (err) {
      console.error("Error loading dashboard data:", err);
      alert("Error loading data. Check console for details.");
    } finally {
      refreshBtn.disabled = false;
      refreshBtn.textContent = 'Refresh';
    }
  }

  function updateMetrics() {
    // Total counters
    metricTotal.textContent = waitlistData.length.toLocaleString();
    metricSurveys.textContent = surveysData.length.toLocaleString();

    // Unique countries
    const countries = new Set(waitlistData.map(r => r.country?.trim().toLowerCase()).filter(Boolean));
    metricCountries.textContent = countries.size;

    // Test Interest Rate
    if (waitlistData.length > 0) {
      const interested = waitlistData.filter(r => r.test_interest === true).length;
      const rate = Math.round((interested / waitlistData.length) * 100);
      metricInterest.textContent = `${rate}%`;
    } else {
      metricInterest.textContent = '0%';
    }

    // Tabs headers update count labels
    tabWaitlistBtn.textContent = `Waitlist (${waitlistData.length})`;
    tabSurveysBtn.textContent = `Surveys (${surveysData.length})`;
  }

  // ---------- Search & Filter Rendering ----------
  function getFilteredData() {
    const list = currentTab === 'waitlist' ? waitlistData : surveysData;
    if (!currentSearch) return list;

    const term = currentSearch.toLowerCase();
    return list.filter(row => {
      if (currentTab === 'waitlist') {
        return (row.name?.toLowerCase().includes(term) ||
                row.email?.toLowerCase().includes(term) ||
                row.country?.toLowerCase().includes(term) ||
                row.profession?.toLowerCase().includes(term));
      } else {
        return (row.intent?.toLowerCase().includes(term) ||
                row.price?.toLowerCase().includes(term) ||
                row.frustration?.toLowerCase().includes(term) ||
                (row.carry && row.carry.some(c => c.toLowerCase().includes(term))));
      }
    });
  }

  function renderCurrentTable() {
    const data = getFilteredData();
    tableHeaders.innerHTML = '';
    tableBody.innerHTML = '';

    if (data.length === 0) {
      noDataContainer.style.display = 'block';
      return;
    }
    noDataContainer.style.display = 'none';

    if (currentTab === 'waitlist') {
      // Setup Waitlist Headers
      tableHeaders.innerHTML = `
        <th>Date</th>
        <th>Name</th>
        <th>Email</th>
        <th>Country</th>
        <th>Profession</th>
        <th>Tester Interest</th>
      `;
      // Render Waitlist Rows
      data.forEach(row => {
        const tr = document.createElement('tr');
        const formattedDate = new Date(row.created_at).toLocaleString();
        tr.innerHTML = `
          <td class="date-cell">${formattedDate}</td>
          <td style="font-weight: 500;">${escapeHtml(row.name)}</td>
          <td><a href="mailto:${escapeHtml(row.email)}" style="text-decoration: underline; color: var(--blue-bright);">${escapeHtml(row.email)}</a></td>
          <td>${escapeHtml(row.country)}</td>
          <td>${row.profession ? escapeHtml(row.profession) : '—'}</td>
          <td><span class="badge ${row.test_interest ? 'badge-yes' : 'badge-no'}">${row.test_interest ? 'YES' : 'NO'}</span></td>
        `;
        tableBody.appendChild(tr);
      });

    } else {
      // Setup Survey Headers
      tableHeaders.innerHTML = `
        <th>Date</th>
        <th>Preorder Intent</th>
        <th>Gear Carried</th>
        <th>Biggest Frustration</th>
        <th>Price Expectation</th>
      `;
      // Render Survey Rows
      data.forEach(row => {
        const tr = document.createElement('tr');
        const formattedDate = new Date(row.created_at).toLocaleString();
        const carryList = (row.carry || []).join(', ') || '—';
        tr.innerHTML = `
          <td class="date-cell">${formattedDate}</td>
          <td>${escapeHtml(row.intent)}</td>
          <td>${escapeHtml(carryList)}</td>
          <td style="max-width: 320px; white-space: normal; line-height: 1.4;">${row.frustration ? escapeHtml(row.frustration) : '—'}</td>
          <td>${escapeHtml(row.price)}</td>
        `;
        tableBody.appendChild(tr);
      });
    }
  }

  // ---------- Control Handlers ----------
  tabWaitlistBtn.addEventListener('click', () => {
    if (currentTab === 'waitlist') return;
    currentTab = 'waitlist';
    tabWaitlistBtn.classList.add('active');
    tabSurveysBtn.classList.remove('active');
    renderCurrentTable();
  });

  tabSurveysBtn.addEventListener('click', () => {
    if (currentTab === 'surveys') return;
    currentTab = 'surveys';
    tabSurveysBtn.classList.add('active');
    tabWaitlistBtn.classList.remove('active');
    renderCurrentTable();
  });

  searchInput.addEventListener('input', (e) => {
    currentSearch = e.target.value;
    renderCurrentTable();
  });

  refreshBtn.addEventListener('click', loadData);

  // ---------- CSV Export Implementation ----------
  exportBtn.addEventListener('click', () => {
    const data = getFilteredData();
    if (data.length === 0) {
      alert("No data available to export.");
      return;
    }

    let csvContent = "data:text/csv;charset=utf-8,";
    
    if (currentTab === 'waitlist') {
      csvContent += "Date,Name,Email,Country,Profession,Prototype Tester Interest\r\n";
      data.forEach(row => {
        const cols = [
          new Date(row.created_at).toLocaleString(),
          row.name,
          row.email,
          row.country,
          row.profession || '',
          row.test_interest ? 'YES' : 'NO'
        ].map(val => `"${String(val).replace(/"/g, '""')}"`);
        csvContent += cols.join(",") + "\r\n";
      });
    } else {
      csvContent += "Date,Preorder Intent,Gear Carried,Biggest Frustration,Price Expectation\r\n";
      data.forEach(row => {
        const cols = [
          new Date(row.created_at).toLocaleString(),
          row.intent,
          (row.carry || []).join(', '),
          row.frustration || '',
          row.price
        ].map(val => `"${String(val).replace(/"/g, '""')}"`);
        csvContent += cols.join(",") + "\r\n";
      });
    }

    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", `adaptfit_${currentTab}_export_${Date.now()}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  });

  // Utilities
  function escapeHtml(str) {
    if (typeof str !== 'string') return '';
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
  }

})(supabase);
}
initAdmin();
</script>
</body>
</html>
